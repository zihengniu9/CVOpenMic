<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="680" viewBox="0 0 1400 680" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦八字职业镜像</title>
  <desc id="desc">八字职业镜像是一个可选的传统文化职业反思模块。从用户主动开启和最小出生信息开始，经可靠排盘、五类工作方式镜头以及简历和岗位现实验证，形成个人反思备忘。该模块现实证据优先，不进入简历评分、简历正文或招聘决策。</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1F1F24" stroke-width="1" opacity="0.34"/>
    </pattern>
    <style>
      text {
        font-family: "Inter", "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      }
      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        letter-spacing: 1.25px;
      }
      .muted { fill: #8A8A95; }
      .primary { fill: #E8E8EB; }
      .cyan { fill: #6ABFFF; }
      .lens { fill: #929DBD; }
    </style>
  </defs>

  <rect width="1400" height="680" fill="#050508"/>
  <rect width="1400" height="680" fill="url(#grid)"/>
  <rect x="24.5" y="24.5" width="1351" height="631" rx="3" fill="#050508" fill-opacity="0.9" stroke="#1F1F24"/>

  <!-- System header -->
  <g transform="translate(56 54)">
    <circle cx="4" cy="4" r="4" fill="#6ABFFF"/>
    <text x="18" y="9" class="mono muted" font-size="12" font-weight="600">CVOPENMIC / OPTIONAL MODULE</text>
  </g>
  <text x="1344" y="63" text-anchor="end" class="mono cyan" font-size="13" font-weight="700">07 / CULTURAL LENS</text>
  <path d="M56 88.5H1344" stroke="#1F1F24"/>

  <!-- Editorial lead -->
  <g transform="translate(56 122)">
    <text y="18" class="mono lens" font-size="12" font-weight="700">TRADITIONAL-CULTURE CAREER REFLECTION</text>
    <text y="84" class="primary" font-size="54" font-weight="700" letter-spacing="-1.2">八字职业镜像</text>
    <text y="128" class="primary" font-size="23" font-weight="500">不是替你选工作，是多一面认识自己的镜子。</text>
    <text y="164" class="muted" font-size="15">传统符号只生成工作偏好假设；真实经历与岗位环境负责验证。</text>
  </g>

  <g transform="translate(1081 126)">
    <rect x="0.5" y="0.5" width="263" height="112" rx="2" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="20" y="28" class="mono muted" font-size="11" font-weight="700">OPERATING MODE</text>
    <text x="20" y="59" class="primary" font-size="16" font-weight="600">独立反思层</text>
    <path d="M20 75.5H243" stroke="#1F1F24"/>
    <circle cx="26" cy="93" r="3" fill="#6ABFFF"/>
    <text x="38" y="98" class="muted" font-size="13">不回写证据评分</text>
  </g>

  <!-- Six-stage pipeline -->
  <g transform="translate(56 326)">
    <text y="-18" class="mono muted" font-size="11" font-weight="700">REFLECTION PIPELINE / 01—06</text>

    <g>
      <rect x="0.5" y="0.5" width="189" height="158" rx="2" fill="#0A0A0D" stroke="#1F1F24"/>
      <path d="M1 1H189" stroke="#6ABFFF"/>
      <text x="18" y="28" class="mono cyan" font-size="11" font-weight="700">01 / OPT-IN</text>
      <text x="18" y="72" class="primary" font-size="20" font-weight="600">主动开启</text>
      <text x="18" y="105" class="muted" font-size="13">仅在本人明确提出时</text>
      <text x="18" y="128" class="muted" font-size="13">进入独立流程</text>
    </g>

    <text x="202" y="87" class="mono cyan" font-size="15">→</text>

    <g transform="translate(216)">
      <rect x="0.5" y="0.5" width="189" height="158" rx="2" fill="#0A0A0D" stroke="#1F1F24"/>
      <path d="M1 1H189" stroke="#1F1F24"/>
      <text x="18" y="28" class="mono muted" font-size="11" font-weight="700">02 / MINIMUM</text>
      <text x="18" y="72" class="primary" font-size="20" font-weight="600">最小出生信息</text>
      <text x="18" y="105" class="muted" font-size="13">日期 · 当地时间</text>
      <text x="18" y="128" class="muted" font-size="13">出生城市</text>
    </g>

    <text x="418" y="87" class="mono cyan" font-size="15">→</text>

    <g transform="translate(432)">
      <rect x="0.5" y="0.5" width="189" height="158" rx="2" fill="#0A0A0D" stroke="#1F1F24"/>
      <path d="M1 1H189" stroke="#1F1F24"/>
      <text x="18" y="28" class="mono muted" font-size="11" font-weight="700">03 / SOURCE</text>
      <text x="18" y="72" class="primary" font-size="20" font-weight="600">可靠排盘</text>
      <text x="18" y="105" class="muted" font-size="13">来源可追溯</text>
      <text x="18" y="128" class="muted" font-size="13">不凭记忆推算</text>
    </g>

    <text x="634" y="87" class="mono cyan" font-size="15">→</text>

    <g transform="translate(648)">
      <rect x="0.5" y="0.5" width="189" height="158" rx="2" fill="#0A0A0D" stroke="#303441"/>
      <path d="M1 1H189" stroke="#929DBD"/>
      <text x="18" y="28" class="mono lens" font-size="11" font-weight="700">04 / TRANSLATE</text>
      <text x="18" y="66" class="primary" font-size="20" font-weight="600">五类工作方式</text>
      <text x="18" y="91" class="primary" font-size="20" font-weight="600">镜头</text>
      <text x="18" y="121" class="muted" font-size="12">学习 · 表达 · 商业</text>
      <text x="18" y="142" class="muted" font-size="12">责任 · 自主协作</text>
    </g>

    <text x="850" y="87" class="mono cyan" font-size="15">→</text>

    <g transform="translate(864)">
      <rect x="0.5" y="0.5" width="189" height="158" rx="2" fill="#0A0A0D" stroke="#303441"/>
      <path d="M1 1H189" stroke="#929DBD"/>
      <text x="18" y="28" class="mono lens" font-size="11" font-weight="700">05 / VERIFY</text>
      <text x="18" y="66" class="primary" font-size="20" font-weight="600">简历 × JD</text>
      <text x="18" y="91" class="primary" font-size="20" font-weight="600">现实验证</text>
      <text x="18" y="121" class="muted" font-size="12">用经历找支持</text>
      <text x="18" y="142" class="muted" font-size="12">也保留反例</text>
    </g>

    <text x="1066" y="87" class="mono cyan" font-size="15">→</text>

    <g transform="translate(1080)">
      <rect x="0.5" y="0.5" width="207" height="158" rx="2" fill="#0A0A0D" stroke="#354968"/>
      <path d="M1 1H207" stroke="#6ABFFF"/>
      <text x="18" y="28" class="mono cyan" font-size="11" font-weight="700">06 / MEMO</text>
      <text x="18" y="66" class="primary" font-size="20" font-weight="600">个人反思备忘</text>
      <text x="18" y="105" class="muted" font-size="12">相合信号 · 待验证</text>
      <text x="18" y="128" class="muted" font-size="12">可能存在的环境张力</text>
    </g>
  </g>

  <!-- Hard boundaries -->
  <g transform="translate(56 546)">
    <rect x="0.5" y="0.5" width="1287" height="80" rx="2" fill="#0A0A0D" stroke="#1F1F24"/>
    <g transform="translate(20 0)">
      <text y="30" class="mono cyan" font-size="11" font-weight="700">HARD BOUNDARIES</text>
      <text y="54" class="muted" font-size="12">不可跨越的使用边界</text>
    </g>
    <path d="M194.5 1V79M413.5 1V79M632.5 1V79M851.5 1V79M1070.5 1V79" stroke="#1F1F24"/>

    <g transform="translate(217)">
      <circle cx="10" cy="40" r="3" fill="#6ABFFF"/>
      <text x="23" y="45" class="primary" font-size="14" font-weight="600">本人主动开启</text>
    </g>
    <g transform="translate(436)">
      <circle cx="10" cy="40" r="3" fill="#6ABFFF"/>
      <text x="23" y="45" class="primary" font-size="14" font-weight="600">现实证据优先</text>
    </g>
    <g transform="translate(655)">
      <circle cx="10" cy="40" r="3" fill="#929DBD"/>
      <text x="23" y="45" class="primary" font-size="14" font-weight="600">不进简历评分</text>
    </g>
    <g transform="translate(874)">
      <circle cx="10" cy="40" r="3" fill="#929DBD"/>
      <text x="23" y="45" class="primary" font-size="14" font-weight="600">不写入简历</text>
    </g>
    <g transform="translate(1093)">
      <circle cx="10" cy="40" r="3" fill="#929DBD"/>
      <text x="23" y="45" class="primary" font-size="14" font-weight="600">不用于招聘决策</text>
    </g>
  </g>

  <text x="56" y="648" class="mono muted" font-size="10">TRADITIONAL-CULTURE REFERENCE / NOT A SCIENTIFIC ASSESSMENT</text>
  <text x="1344" y="648" text-anchor="end" class="mono muted" font-size="10">CVOPENMIC · JIANLI KAIMAI</text>
</svg>
