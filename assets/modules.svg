<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦模块地图</title>
  <desc id="desc">六个核心模块包括材料解析与隐私、岗位路由、证据评分、毒舌诊断、事实安全改写和 Word PDF 交付，另有不参与评分的可选八字职业反思。</desc>
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0A2235"/>
      <stop offset="1" stop-color="#15576A"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .title { font-size: 25px; font-weight: 900; fill: #102A43; }
      .body { font-size: 17px; fill: #526D82; }
      .tag { font-size: 14px; font-weight: 800; fill: #24546A; }
      .index { font-size: 18px; font-weight: 900; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="30" fill="#F5F8FA"/>
  <rect width="1400" height="166" rx="30" fill="url(#top)"/>
  <rect y="138" width="1400" height="28" fill="url(#top)"/>
  <text x="64" y="66" font-size="36" font-weight="900" fill="#FFFFFF">一个 Skill，六个核心模块</text>
  <text x="64" y="106" font-size="19" font-weight="600" fill="#B9D7DE">从材料进入，到可投递文件离开；每个模块都有清晰边界</text>
  <g transform="translate(1110 45)">
    <rect width="226" height="58" rx="29" fill="#2DD4BF"/>
    <text x="113" y="37" text-anchor="middle" font-size="19" font-weight="900" fill="#0A2A38">简历开麦 · CVOpenMic</text>
  </g>

  <g transform="translate(54 208)">
    <rect width="406" height="250" rx="24" fill="#FFFFFF" stroke="#C9D9E2" stroke-width="2"/>
    <circle cx="42" cy="42" r="22" fill="#557C91"/>
    <text x="42" y="49" text-anchor="middle" class="index">01</text>
    <g transform="translate(305 26)">
      <path d="M0 0 H48 L66 18 V68 H0 Z" fill="#E7EEF2" stroke="#557C91" stroke-width="2"/>
      <path d="M48 0 V18 H66" fill="none" stroke="#557C91" stroke-width="2"/>
      <path d="M13 31 H52 M13 43 H52 M13 55 H39" stroke="#557C91" stroke-width="4" stroke-linecap="round"/>
      <path d="M50 55 Q50 38 66 38 Q82 38 82 55 V69 H50 Z" fill="#2DD4BF" stroke="#11665D" stroke-width="2"/>
      <path d="M57 38 V31 Q57 22 66 22 Q75 22 75 31 V38" fill="none" stroke="#11665D" stroke-width="3"/>
