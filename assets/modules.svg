      <path d="M24 39 Q24 54 38 54 Q53 54 53 39" fill="none" stroke="#A63C30" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="30" y="104" class="title">毒舌开麦诊断</text>
    <text x="30" y="139" class="body">先提炼亮点，再指出真正硬伤，</text>
    <text x="30" y="166" class="body">不绕弯，也不只给空泛评价。</text>
    <g transform="translate(30 199)">
      <rect width="108" height="30" rx="15" fill="#FFF0ED"/>
      <text x="54" y="21" text-anchor="middle" class="tag">结论先行</text>
      <rect x="120" width="108" height="30" rx="15" fill="#FFF0ED"/>
      <text x="174" y="21" text-anchor="middle" class="tag">问题分级</text>
    </g>
  </g>

  <g transform="translate(497 494)">
    <rect width="406" height="250" rx="24" fill="#FFFFFF" stroke="#F0D08B" stroke-width="2"/>
    <circle cx="42" cy="42" r="22" fill="#E7A420"/>
    <text x="42" y="49" text-anchor="middle" class="index">05</text>
    <g transform="translate(302 25)">
      <path d="M5 68 L16 43 L58 1 L79 22 L37 64 L12 75 Z" fill="#FFF2CD" stroke="#D99112" stroke-width="2"/>
      <path d="M58 1 L79 22 M16 43 L37 64" stroke="#D99112" stroke-width="4"/>
      <path d="M2 10 H39 M2 23 H31" stroke="#7FA7B6" stroke-width="5" stroke-linecap="round"/>
    </g>
