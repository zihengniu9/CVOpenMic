    <text x="30" y="139" class="body">区分事实、推断、缺口和冲突，</text>
    <text x="30" y="166" class="body">用统一量表确定修改优先级。</text>
    <g transform="translate(30 199)">
      <rect width="114" height="30" rx="15" fill="#E8F1F5"/>
      <text x="57" y="21" text-anchor="middle" class="tag">100 分量表</text>
      <rect x="126" width="100" height="30" rx="15" fill="#FFF3E0"/>
      <text x="176" y="21" text-anchor="middle" class="tag">可追溯</text>
    </g>
  </g>

  <g transform="translate(54 494)">
    <rect width="406" height="250" rx="24" fill="#FFFFFF" stroke="#FFC4B9" stroke-width="2"/>
    <circle cx="42" cy="42" r="22" fill="#FF6B57"/>
    <text x="42" y="49" text-anchor="middle" class="index">04</text>
    <g transform="translate(299 25)">
      <path d="M10 7 H65 Q78 7 78 20 V50 Q78 63 65 63 H44 L27 77 V63 H10 Q0 63 0 50 V20 Q0 7 10 7 Z" fill="#FFE6E1" stroke="#FF6B57" stroke-width="2"/>
