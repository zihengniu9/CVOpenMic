      <circle cx="39" cy="39" r="22" fill="none" stroke="#FFCC66" stroke-width="2"/>
      <path d="M39 7 V71 M7 39 H71 M16 16 L62 62 M62 16 L16 62" stroke="#FFCC66" stroke-width="2" opacity="0.8"/>
      <circle cx="39" cy="39" r="6" fill="#FFCC66"/>
    </g>
    <text x="128" y="48" font-size="23" font-weight="900" fill="#FFFFFF">可选模块：八字职业反思</text>
    <text x="128" y="80" font-size="17" fill="#B9CFDA">把传统命理语言转译为工作环境、协作方式与风险偏好的自我反思。</text>
    <g transform="translate(900 35)">
      <rect width="350" height="64" rx="18" fill="#193D51" stroke="#FFCC66"/>
      <text x="175" y="27" text-anchor="middle" font-size="16" font-weight="900" fill="#FFDC8A">不进评分 · 不进简历</text>
      <text x="175" y="49" text-anchor="middle" font-size="14" fill="#D4E2E8">不代替招聘判断，也不作确定性预测</text>
    </g>
  </g>
