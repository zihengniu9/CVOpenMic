    <text x="30" y="139" class="body">识别岗位语言与能力权重，</text>
    <text x="30" y="166" class="body">让同一经历说到招聘方心里。</text>
    <g transform="translate(30 199)">
      <rect width="98" height="30" rx="15" fill="#E7F8F4"/>
      <text x="49" y="21" text-anchor="middle" class="tag">AI 策略</text>
      <rect x="110" width="110" height="30" rx="15" fill="#F4F8E8"/>
      <text x="165" y="21" text-anchor="middle" class="tag">产品 / 数据</text>
    </g>
  </g>

