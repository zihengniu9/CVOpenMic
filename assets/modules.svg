    <circle cx="42" cy="42" r="22" fill="#3D6F8A"/>
    <text x="42" y="49" text-anchor="middle" class="index">03</text>
    <g transform="translate(297 28)">
      <rect x="0" y="49" width="15" height="27" rx="5" fill="#B7CAD4"/>
      <rect x="25" y="34" width="15" height="42" rx="5" fill="#7FA7B6"/>
      <rect x="50" y="17" width="15" height="59" rx="5" fill="#3D6F8A"/>
