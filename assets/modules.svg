<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦模块目录</title>
  <desc id="desc">以开发者工具目录展示 parser、ledger、router、critic、rewriter、renderer 六个核心模块，以及不参与评分的可选 bazi-lens 文化镜像模块。</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#E8E8EB" stroke-width="1" opacity="0.028"/>
    </pattern>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; }
      .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.8px; fill: #6ABFFF; }
      .heading { font-size: 42px; font-weight: 600; letter-spacing: -1.6px; fill: #E8E8EB; }
      .sub { font-size: 16px; font-weight: 400; fill: #8A8A95; }
      .th { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; fill: #8A8A95; }
      .id { font-size: 12px; font-weight: 500; fill: #6ABFFF; }
      .module { font-size: 17px; font-weight: 600; fill: #E8E8EB; }
      .body { font-size: 14px; font-weight: 400; fill: #8A8A95; }
      .output { font-size: 12px; font-weight: 400; fill: #B8B8C1; }
      .state { font-size: 11px; font-weight: 600; letter-spacing: 1px; fill: #E8E8EB; }
      .flow { font-size: 12px; font-weight: 500; fill: #E8E8EB; }
      .flowMeta { font-size: 10px; font-weight: 500; letter-spacing: .8px; fill: #8A8A95; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="#050508"/>
  <rect width="1400" height="820" fill="url(#grid)"/>

  <g id="header">
    <rect x="72" y="48" width="28" height="1" fill="#6ABFFF"/>
    <text x="112" y="53" class="eyebrow mono">SYSTEM / MODULE DIRECTORY</text>
    <text x="72" y="108" class="heading">简历开麦 · 模块目录</text>
    <text x="72" y="143" class="sub">一条证据驱动的简历工作流，外加一枚严格隔离的文化反思镜头。</text>

    <text x="1328" y="55" text-anchor="end" class="th mono">CVOPENMIC</text>
    <text x="1328" y="80" text-anchor="end" class="body mono">07 MODULES / v1.0</text>
    <circle cx="1319" cy="111" r="3" fill="#6ABFFF"/>
    <text x="1308" y="115" text-anchor="end" class="th mono">SYSTEM READY</text>
  </g>

  <g id="core-directory">
    <rect x="72.5" y="184.5" width="1255" height="362" rx="16" fill="#0A0A0D" stroke="#1F1F24"/>
    <rect x="73" y="185" width="4" height="51" fill="#6ABFFF"/>

    <text x="104" y="217" class="th mono">ID</text>
    <text x="166" y="217" class="th mono">MODULE</text>
    <text x="360" y="217" class="th mono">RESPONSIBILITY</text>
    <text x="855" y="217" class="th mono">OUTPUT</text>
    <text x="1250" y="217" text-anchor="end" class="th mono">STATE</text>
    <line x1="73" y1="236.5" x2="1327" y2="236.5" stroke="#1F1F24"/>

    <g transform="translate(0 0)">
      <text x="104" y="271" class="id mono">01</text>
      <text x="166" y="271" class="module mono">parser</text>
      <text x="360" y="271" class="body">读取简历、JD 与补充材料；最小化敏感信息暴露</text>
      <text x="855" y="271" class="output mono">source_blocks[]</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
      <line x1="104" y1="291.5" x2="1296" y2="291.5" stroke="#1F1F24"/>
    </g>

    <g transform="translate(0 51)">
      <text x="104" y="271" class="id mono">02</text>
      <text x="166" y="271" class="module mono">ledger</text>
      <text x="360" y="271" class="body">追踪来源、岗位要求、缺口与冲突；禁止把推断写成事实</text>
      <text x="855" y="271" class="output mono">SOURCE / JD / MISSING</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
      <line x1="104" y1="291.5" x2="1296" y2="291.5" stroke="#1F1F24"/>
    </g>

    <g transform="translate(0 102)">
      <text x="104" y="271" class="id mono">03</text>
      <text x="166" y="271" class="module mono">router</text>
      <text x="360" y="271" class="body">按目标岗位重排证据与重点，匹配策略、产品、数据等方向</text>
      <text x="855" y="271" class="output mono">role_route.json</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
      <line x1="104" y1="291.5" x2="1296" y2="291.5" stroke="#1F1F24"/>
    </g>

    <g transform="translate(0 153)">
      <text x="104" y="271" class="id mono">04</text>
      <text x="166" y="271" class="module mono">critic</text>
      <text x="360" y="271" class="body">先给结论，再毒舌定位最影响过筛的问题与优先级</text>
      <text x="855" y="271" class="output mono">scorecard + roast</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
      <line x1="104" y1="291.5" x2="1296" y2="291.5" stroke="#1F1F24"/>
    </g>

    <g transform="translate(0 204)">
      <text x="104" y="271" class="id mono">05</text>
      <text x="166" y="271" class="module mono">rewriter</text>
      <text x="360" y="271" class="body">把经历改成证据链表述，输出可直接复制且事实安全的版本</text>
      <text x="855" y="271" class="output mono">copy_ready_bullets[]</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
      <line x1="104" y1="291.5" x2="1296" y2="291.5" stroke="#1F1F24"/>
    </g>

    <g transform="translate(0 255)">
      <text x="104" y="271" class="id mono">06</text>
      <text x="166" y="271" class="module mono">renderer</text>
      <text x="360" y="271" class="body">生成可编辑 Word，并用同源 PDF 完成最终视觉校验</text>
      <text x="855" y="271" class="output mono">resume.docx + preview.pdf</text>
      <rect x="1213" y="261" width="7" height="7" fill="#6ABFFF"/>
      <text x="1250" y="271" text-anchor="end" class="state mono">CORE</text>
    </g>
  </g>

  <g id="bazi-lens">
    <rect x="72.5" y="574.5" width="1255" height="181" rx="16" fill="#0A0A0D" stroke="#1F1F24"/>
    <rect x="73" y="575" width="4" height="180" fill="#6ABFFF"/>

    <text x="104" y="613" class="id mono">07 / BAZI-LENS</text>
    <text x="104" y="642" class="module">八字职业镜像</text>
    <text x="104" y="670" class="body">传统文化职业反思组件，只提出工作方式假设。</text>
    <text x="104" y="693" class="body">所有结论都需由用户用现实经历验证。</text>
    <rect x="103.5" y="710.5" width="207" height="28" rx="5" fill="none" stroke="#1F1F24"/>
    <text x="207" y="729" text-anchor="middle" class="state mono" fill="#8A8A95">OPTIONAL / NO SCORE INPUT</text>

    <g transform="translate(508 604)">
      <g>
        <rect x="0.5" y="0.5" width="158" height="70" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="25" class="flowMeta mono">01 / INPUT</text>
        <text x="16" y="50" class="flow mono">birth context</text>
      </g>
      <line x1="159" y1="35.5" x2="185" y2="35.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="172" cy="35.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(185 0)">
        <rect x="0.5" y="0.5" width="176" height="70" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="25" class="flowMeta mono">02 / HYPOTHESIS</text>
        <text x="16" y="50" class="flow mono">work-style hypotheses</text>
      </g>
      <line x1="361" y1="35.5" x2="387" y2="35.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="374" cy="35.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(387 0)">
        <rect x="0.5" y="0.5" width="158" height="70" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="25" class="flowMeta mono">03 / VERIFY</text>
        <text x="16" y="50" class="flow mono">reality check</text>
      </g>
      <line x1="545" y1="35.5" x2="571" y2="35.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="558" cy="35.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(571 0)">
        <rect x="0.5" y="0.5" width="176" height="70" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="25" class="flowMeta mono">04 / OUTPUT</text>
        <text x="16" y="50" class="flow mono">reflection memo</text>
      </g>
      <line x1="0" y1="94.5" x2="747" y2="94.5" stroke="#1F1F24" stroke-dasharray="5 7"/>
      <text x="747" y="116" text-anchor="end" class="flowMeta mono">ISOLATED FROM SCORE + RESUME</text>
    </g>
  </g>

  <text x="72" y="792" class="th mono">EVIDENCE IN / EDITABLE FILES OUT</text>
  <text x="1328" y="792" text-anchor="end" class="th mono">FACT-SAFE BY DEFAULT</text>
</svg>
