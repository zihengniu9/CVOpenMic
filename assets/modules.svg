    <text x="30" y="104" class="title">材料解析与隐私</text>
    <text x="30" y="139" class="body">读取简历、JD 与补充材料，</text>
    <text x="30" y="166" class="body">先去敏感信息，再进入分析。</text>
    <g transform="translate(30 199)">
      <rect width="98" height="30" rx="15" fill="#E8F1F5"/>
      <text x="49" y="21" text-anchor="middle" class="tag">PDF/DOCX</text>
      <rect x="110" width="92" height="30" rx="15" fill="#E7F8F4"/>
      <text x="156" y="21" text-anchor="middle" class="tag">隐私优先</text>
    </g>
  </g>

  <g transform="translate(497 208)">
    <rect width="406" height="250" rx="24" fill="#FFFFFF" stroke="#A7DED8" stroke-width="2"/>
    <circle cx="42" cy="42" r="22" fill="#2AAE9F"/>
