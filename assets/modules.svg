<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦能力模块</title>
  <desc id="desc">六张核心能力卡片展示材料解析、岗位路由、证据评分、毒舌诊断、安全改写和文件交付，下方独立展示不参与评分的八字职业镜像。</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#E8E8EB" stroke-width="1" opacity="0.028"/>
    </pattern>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; }
      .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; fill: #6ABFFF; }
      .heading { font-size: 38px; font-weight: 600; letter-spacing: -1.2px; fill: #E8E8EB; }
      .sub { font-size: 15px; font-weight: 400; fill: #8A8A95; }
      .number { font-size: 46px; font-weight: 500; letter-spacing: -2px; fill: #6ABFFF; }
      .cardTitle { font-size: 20px; font-weight: 600; fill: #E8E8EB; }
      .body { font-size: 14px; font-weight: 400; fill: #8A8A95; }
      .tag { font-size: 11px; font-weight: 500; letter-spacing: .2px; fill: #B8B8C1; }
      .flowMeta { font-size: 10px; font-weight: 500; letter-spacing: .8px; fill: #8A8A95; }
      .flow { font-size: 14px; font-weight: 600; fill: #E8E8EB; }
      .footer { font-size: 10px; font-weight: 600; letter-spacing: 1px; fill: #8A8A95; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="#050508"/>
  <rect width="1400" height="820" fill="url(#grid)"/>

  <g id="header">
    <rect x="72" y="41" width="28" height="1" fill="#6ABFFF"/>
    <text x="112" y="46" class="eyebrow mono">CVOPENMIC / 能力模块</text>
    <text x="72" y="94" class="heading">七个清晰模块，一条完整工作流</text>
    <text x="72" y="126" class="sub">从材料进入，到可投递文件离开；每个模块只解决一类明确问题。</text>

    <text x="1328" y="47" text-anchor="end" class="footer mono">版本 1.0 / 07 个模块</text>
    <circle cx="1319" cy="76" r="3" fill="#6ABFFF"/>
    <text x="1308" y="80" text-anchor="end" class="footer mono">工作流就绪</text>
  </g>

  <g id="core-modules">
    <g transform="translate(72 158)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">01</text>
      <text x="112" y="41" class="cardTitle">材料解析与隐私</text>
<text x="112" y="73" class="body">读取简历、岗位说明与补充材料</text>
      <text x="112" y="96" class="body">最小化敏感信息暴露</text>
      <rect x="111.5" y="121.5" width="79" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="151" y="139" text-anchor="middle" class="tag">多格式读取</text>
      <rect x="198.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="232.5" y="139" text-anchor="middle" class="tag">隐私优先</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>

    <g transform="translate(496 158)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">02</text>
      <text x="112" y="41" class="cardTitle">目标岗位路由</text>
      <text x="112" y="73" class="body">按目标岗位重排经历重点</text>
      <text x="112" y="96" class="body">建立能力与需求对应关系</text>
      <rect x="111.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="145.5" y="139" text-anchor="middle" class="tag">岗位匹配</text>
      <rect x="187.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="221.5" y="139" text-anchor="middle" class="tag">重点排序</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>

    <g transform="translate(920 158)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">03</text>
      <text x="112" y="41" class="cardTitle">证据账本与评分</text>
      <text x="112" y="73" class="body">记录来源、缺口与冲突</text>
      <text x="112" y="96" class="body">以现实证据完成百分制评分</text>
      <rect x="111.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="145.5" y="139" text-anchor="middle" class="tag">证据溯源</text>
      <rect x="187.5" y="121.5" width="79" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="227" y="139" text-anchor="middle" class="tag">百分制量表</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>

    <g transform="translate(72 356)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">04</text>
      <text x="112" y="41" class="cardTitle">毒舌开麦诊断</text>
      <text x="112" y="73" class="body">先给结论，再指出致命问题</text>
      <text x="112" y="96" class="body">按过筛影响排序修改优先级</text>
      <rect x="111.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="145.5" y="139" text-anchor="middle" class="tag">结论先行</text>
      <rect x="187.5" y="121.5" width="79" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="227" y="139" text-anchor="middle" class="tag">毒舌但有据</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>

    <g transform="translate(496 356)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">05</text>
      <text x="112" y="41" class="cardTitle">事实安全改写</text>
      <text x="112" y="73" class="body">把经历改写为完整证据链</text>
      <text x="112" y="96" class="body">不给推断披上事实外衣</text>
      <rect x="111.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="145.5" y="139" text-anchor="middle" class="tag">事实边界</text>
      <rect x="187.5" y="121.5" width="79" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="227" y="139" text-anchor="middle" class="tag">可直接复制</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>

    <g transform="translate(920 356)">
      <rect x="0.5" y="0.5" width="407" height="181" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
      <text x="24" y="57" class="number mono">06</text>
      <text x="112" y="41" class="cardTitle">Word / PDF 交付</text>
      <text x="112" y="73" class="body">生成可编辑 Word 源文件</text>
      <text x="112" y="96" class="body">用同源 PDF 完成视觉校验</text>
      <rect x="111.5" y="121.5" width="79" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="151" y="139" text-anchor="middle" class="tag">Word 可编辑</text>
      <rect x="198.5" y="121.5" width="68" height="26" rx="5" fill="#050508" stroke="#1F1F24"/>
      <text x="232.5" y="139" text-anchor="middle" class="tag">PDF 预览</text>
      <rect x="0" y="0" width="3" height="42" rx="1.5" fill="#6ABFFF"/>
    </g>
  </g>

  <g id="bazi-lens">
    <rect x="72.5" y="566.5" width="1255" height="179" rx="12" fill="#0A0A0D" stroke="#1F1F24"/>
    <rect x="72" y="566" width="4" height="179" rx="2" fill="#6ABFFF"/>

    <text x="104" y="608" class="number mono">07</text>
    <text x="184" y="597" class="cardTitle">八字职业镜像</text>
    <text x="184" y="625" class="body">把传统文化语言翻译成可验证的工作方式假设</text>
    <text x="184" y="648" class="body">只生成反思备忘，不影响简历判断</text>
    <rect x="183.5" y="670.5" width="210" height="28" rx="5" fill="#050508" stroke="#1F1F24"/>
    <text x="288.5" y="689" text-anchor="middle" class="tag">可选 · 不进评分 · 不写入简历</text>

    <g transform="translate(514 610)">
      <g>
        <rect x="0.5" y="0.5" width="166" height="68" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="24" class="flowMeta mono">01 / 输入</text>
        <text x="16" y="49" class="flow">最小出生信息</text>
      </g>
      <line x1="167" y1="34.5" x2="187" y2="34.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="177" cy="34.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(187 0)">
        <rect x="0.5" y="0.5" width="166" height="68" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="24" class="flowMeta mono">02 / 假设</text>
        <text x="16" y="49" class="flow">工作方式假设</text>
      </g>
      <line x1="353" y1="34.5" x2="373" y2="34.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="363" cy="34.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(373 0)">
        <rect x="0.5" y="0.5" width="146" height="68" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="24" class="flowMeta mono">03 / 验证</text>
        <text x="16" y="49" class="flow">现实验证</text>
      </g>
      <line x1="519" y1="34.5" x2="539" y2="34.5" stroke="#6ABFFF" opacity=".55"/>
      <circle cx="529" cy="34.5" r="2.5" fill="#6ABFFF"/>
      <g transform="translate(539 0)">
        <rect x="0.5" y="0.5" width="146" height="68" rx="10" fill="#050508" stroke="#1F1F24"/>
        <text x="16" y="24" class="flowMeta mono">04 / 输出</text>
        <text x="16" y="49" class="flow">反思备忘</text>
      </g>
      <line x1="0" y1="91.5" x2="685" y2="91.5" stroke="#1F1F24" stroke-dasharray="5 7"/>
      <text x="685" y="115" text-anchor="end" class="footer mono">与评分和简历正文严格隔离</text>
    </g>
  </g>

  <text x="72" y="788" class="footer mono">现实证据进入 / 可编辑文件输出</text>
  <text x="1328" y="788" text-anchor="end" class="footer mono">默认保证事实边界</text>
</svg>
