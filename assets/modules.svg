    <text x="30" y="139" class="body">给出可直接替换的完整表述，</text>
    <text x="30" y="166" class="body">没有证据的数据一律标记待补。</text>
    <g transform="translate(30 199)">
      <rect width="110" height="30" rx="15" fill="#FFF3E0"/>
      <text x="55" y="21" text-anchor="middle" class="tag">不编经历</text>
      <rect x="122" width="112" height="30" rx="15" fill="#FFF3E0"/>
      <text x="178" y="21" text-anchor="middle" class="tag">可直接粘贴</text>
    </g>
  </g>

  <g transform="translate(940 494)">
    <rect width="406" height="250" rx="24" fill="#FFFFFF" stroke="#C7E785" stroke-width="2"/>
    <circle cx="42" cy="42" r="22" fill="#82B72D"/>
    <text x="42" y="49" text-anchor="middle" class="index">06</text>
    <g transform="translate(294 26)">
      <path d="M0 0 H51 L69 18 V72 H0 Z" fill="#E9F0F4" stroke="#557C91" stroke-width="2"/>
      <path d="M51 0 V18 H69" fill="none" stroke="#557C91" stroke-width="2"/>
      <text x="34" y="50" text-anchor="middle" font-size="21" font-weight="900" fill="#3D6F8A">W</text>
      <circle cx="76" cy="59" r="21" fill="#C7F464" stroke="#5E8A1D" stroke-width="2"/>
      <path d="M67 59 L74 66 L86 51" fill="none" stroke="#365914" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="30" y="104" class="title">Word / PDF 交付</text>
    <text x="30" y="139" class="body">Word 是可编辑源文件，PDF 用来</text>
    <text x="30" y="166" class="body">预览分页、留白与最终投递效果。</text>
    <g transform="translate(30 199)">
      <rect width="114" height="30" rx="15" fill="#F0F8DD"/>
      <text x="57" y="21" text-anchor="middle" class="tag">单栏 ATS</text>
      <rect x="126" width="112" height="30" rx="15" fill="#F0F8DD"/>
      <text x="182" y="21" text-anchor="middle" class="tag">视觉质检</text>
    </g>
