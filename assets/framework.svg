<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦双轨理论框架</title>
  <desc id="desc">证据主轨负责简历评分与改写，传统文化反思支轨只服务自我认识，不进入评分、不进入简历、不代替招聘判断。</desc>
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0A2235"/>
      <stop offset="1" stop-color="#15576A"/>
    </linearGradient>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2AAE9F"/>
    </marker>
    <marker id="arrowSub" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#D39B2C"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .nodeTitle { font-size: 20px; font-weight: 900; fill: #12384C; }
      .nodeBody { font-size: 15px; fill: #627D98; }
      .small { font-size: 14px; fill: #526D82; }
    </style>
  </defs>

  <rect width="1400" height="900" rx="30" fill="#F6F9FB"/>
  <rect width="1400" height="150" rx="30" fill="url(#head)"/>
  <rect y="122" width="1400" height="28" fill="url(#head)"/>
  <text x="62" y="62" font-size="36" font-weight="900" fill="#FFFFFF">双轨框架：证据负责判断，文化负责反思</text>
  <text x="62" y="103" font-size="19" font-weight="600" fill="#BCD8DF">两条轨道可以并行，但绝不混淆边界</text>
  <g transform="translate(1116 44)">
    <rect width="220" height="58" rx="29" fill="#C7F464"/>
    <text x="110" y="37" text-anchor="middle" font-size="19" font-weight="900" fill="#173B40">理论框架</text>
  </g>

  <g transform="translate(48 184)">
    <rect width="1304" height="418" rx="26" fill="#FFFFFF" stroke="#98D8D0" stroke-width="2"/>
    <g transform="translate(26 24)">
      <rect width="176" height="43" rx="21" fill="#DDF7F2"/>
      <circle cx="23" cy="21" r="9" fill="#2AAE9F"/>
      <text x="43" y="29" font-size="20" font-weight="900" fill="#11665D">证据主轨</text>
    </g>
    <text x="222" y="52" font-size="16" font-weight="700" fill="#627D98">唯一进入评分、改写与交付的轨道</text>

    <path d="M119 171 H1166" fill="none" stroke="#2AAE9F" stroke-width="4" marker-end="url(#arrowMain)"/>

    <g transform="translate(38 98)">
      <rect width="206" height="156" rx="20" fill="#F0FAF8" stroke="#9DDED5"/>
      <circle cx="26" cy="26" r="16" fill="#2AAE9F"/>
      <text x="26" y="32" text-anchor="middle" font-size="15" font-weight="900" fill="#FFFFFF">1</text>
      <text x="103" y="61" text-anchor="middle" class="nodeTitle">证据账本</text>
      <text x="103" y="91" text-anchor="middle" class="nodeBody">来源 · 岗位 · 推断</text>
      <text x="103" y="116" text-anchor="middle" class="nodeBody">缺口 · 冲突</text>
      <rect x="35" y="130" width="136" height="8" rx="4" fill="#2AAE9F" opacity="0.35"/>
    </g>

    <g transform="translate(292 98)">
      <rect width="206" height="156" rx="20" fill="#F4F8FA" stroke="#C9D9E2"/>
      <circle cx="26" cy="26" r="16" fill="#3D6F8A"/>
      <text x="26" y="32" text-anchor="middle" font-size="15" font-weight="900" fill="#FFFFFF">2</text>
      <text x="103" y="61" text-anchor="middle" class="nodeTitle">岗位路由</text>
      <text x="103" y="91" text-anchor="middle" class="nodeBody">识别能力权重</text>
      <text x="103" y="116" text-anchor="middle" class="nodeBody">选择对应语言</text>
      <rect x="35" y="130" width="136" height="8" rx="4" fill="#3D6F8A" opacity="0.28"/>
    </g>

    <g transform="translate(546 98)">
      <rect width="206" height="156" rx="20" fill="#F4F8FA" stroke="#C9D9E2"/>
      <circle cx="26" cy="26" r="16" fill="#3D6F8A"/>
      <text x="26" y="32" text-anchor="middle" font-size="15" font-weight="900" fill="#FFFFFF">3</text>
      <text x="103" y="61" text-anchor="middle" class="nodeTitle">100 分量表</text>
      <text x="103" y="91" text-anchor="middle" class="nodeBody">结构 · 相关 · 证据</text>
      <text x="103" y="116" text-anchor="middle" class="nodeBody">表达 · ATS</text>
      <rect x="35" y="130" width="136" height="8" rx="4" fill="#3D6F8A" opacity="0.28"/>
    </g>

    <g transform="translate(800 98)">
      <rect width="206" height="156" rx="20" fill="#FFF9F0" stroke="#F0D08B"/>
      <circle cx="26" cy="26" r="16" fill="#E7A420"/>
      <text x="26" y="32" text-anchor="middle" font-size="15" font-weight="900" fill="#FFFFFF">4</text>
      <text x="103" y="61" text-anchor="middle" class="nodeTitle">证据化改写</text>
      <text x="103" y="91" text-anchor="middle" class="nodeBody">结论先行</text>
      <text x="103" y="116" text-anchor="middle" class="nodeBody">动作与结果闭环</text>
      <rect x="35" y="130" width="136" height="8" rx="4" fill="#E7A420" opacity="0.3"/>
    </g>

    <g transform="translate(1054 98)">
      <rect width="206" height="156" rx="20" fill="#F5FBEA" stroke="#C7E785"/>
      <circle cx="26" cy="26" r="16" fill="#82B72D"/>
      <text x="26" y="32" text-anchor="middle" font-size="15" font-weight="900" fill="#FFFFFF">5</text>
      <text x="103" y="61" text-anchor="middle" class="nodeTitle">交付与质检</text>
      <text x="103" y="91" text-anchor="middle" class="nodeBody">可编辑 Word</text>
      <text x="103" y="116" text-anchor="middle" class="nodeBody">PDF 视觉预览</text>
      <rect x="35" y="130" width="136" height="8" rx="4" fill="#82B72D" opacity="0.3"/>
    </g>

    <g transform="translate(38 284)">
      <rect width="1222" height="104" rx="19" fill="#102F43"/>
      <text x="28" y="35" font-size="16" font-weight="800" fill="#62E5D7">单条经历的表达公式</text>
      <text x="28" y="73" font-size="22" font-weight="900" fill="#FFFFFF">问题 / 场景</text>
      <text x="175" y="73" font-size="21" font-weight="900" fill="#2DD4BF">→</text>
      <text x="218" y="73" font-size="22" font-weight="900" fill="#FFFFFF">动作 / 取舍</text>
      <text x="371" y="73" font-size="21" font-weight="900" fill="#2DD4BF">→</text>
      <text x="414" y="73" font-size="22" font-weight="900" fill="#FFFFFF">范围 / 规模</text>
      <text x="567" y="73" font-size="21" font-weight="900" fill="#2DD4BF">→</text>
      <text x="610" y="73" font-size="22" font-weight="900" fill="#FFFFFF">结果 / 影响</text>
      <text x="763" y="73" font-size="21" font-weight="900" fill="#2DD4BF">→</text>
      <text x="806" y="73" font-size="22" font-weight="900" fill="#FFFFFF">业务意义</text>
      <rect x="1000" y="26" width="190" height="53" rx="16" fill="#C7F464"/>
      <text x="1095" y="59" text-anchor="middle" font-size="17" font-weight="900" fill="#173B40">每一项都要有出处</text>
    </g>
  </g>

  <g transform="translate(48 630)">
    <rect width="1304" height="222" rx="26" fill="#132E42" stroke="#E7B64C" stroke-width="2" stroke-dasharray="10 8"/>
    <g transform="translate(26 24)">
      <rect width="244" height="43" rx="21" fill="#4A3A22"/>
      <circle cx="23" cy="21" r="9" fill="#FFCC66"/>
      <text x="43" y="29" font-size="20" font-weight="900" fill="#FFDF96">传统文化反思支轨</text>
    </g>
    <text x="290" y="52" font-size="16" font-weight="700" fill="#B9CFDA">可选开启，只用于扩展自我认识</text>

    <g transform="translate(30 92)">
      <rect width="254" height="94" rx="18" fill="#1C4055" stroke="#8E7440"/>
      <text x="127" y="34" text-anchor="middle" font-size="19" font-weight="900" fill="#FFFFFF">出生信息（最小化）</text>
      <text x="127" y="64" text-anchor="middle" font-size="15" fill="#B9CFDA">日期 · 时间 · 地点</text>
    </g>
    <path d="M304 139 H358" fill="none" stroke="#D39B2C" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arrowSub)"/>
    <g transform="translate(376 92)">
      <rect width="292" height="94" rx="18" fill="#1C4055" stroke="#8E7440"/>
      <text x="146" y="34" text-anchor="middle" font-size="19" font-weight="900" fill="#FFFFFF">命理语言转译</text>
      <text x="146" y="64" text-anchor="middle" font-size="15" fill="#B9CFDA">印 · 食伤 · 财 · 官杀 · 比劫</text>
    </g>
    <path d="M688 139 H742" fill="none" stroke="#D39B2C" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arrowSub)"/>
    <g transform="translate(760 92)">
      <rect width="264" height="94" rx="18" fill="#1C4055" stroke="#8E7440"/>
      <text x="132" y="34" text-anchor="middle" font-size="19" font-weight="900" fill="#FFFFFF">职业自我反思</text>
      <text x="132" y="64" text-anchor="middle" font-size="15" fill="#B9CFDA">环境 · 协作 · 风险偏好</text>
    </g>
    <g transform="translate(1053 92)">
      <rect width="221" height="94" rx="18" fill="#442E2C" stroke="#FF8C7A"/>
      <text x="110" y="30" text-anchor="middle" font-size="16" font-weight="900" fill="#FFB6A9">三条硬边界</text>
      <text x="110" y="55" text-anchor="middle" font-size="14" fill="#FFE4DE">不进评分 · 不进简历</text>
      <text x="110" y="77" text-anchor="middle" font-size="14" fill="#FFE4DE">不代替招聘判断</text>
    </g>
  </g>

  <text x="700" y="881" text-anchor="middle" font-size="15" font-weight="700" fill="#627D98">简历开麦坚持：事实决定写什么，目标岗位决定怎么写。</text>
</svg>
