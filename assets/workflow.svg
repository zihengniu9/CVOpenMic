<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦工程流水线</title>
  <desc id="desc">主链按照输入、推理、交付三个阶段运行；八字职业镜头是独立可选支线，只输出自我反思，不回流简历评分和改写。</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1F1F24" stroke-width="1"/>
    </pattern>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "Cascadia Mono", Consolas, monospace; }
      .text { fill: #E8E8EB; }
      .muted { fill: #8A8A95; }
      .accent { fill: #6ABFFF; }
      .meta { font-size: 12px; font-weight: 600; letter-spacing: 1.2px; }
      .stageTitle { font-size: 19px; font-weight: 600; }
      .step { font-size: 14px; font-weight: 500; }
      .detail { font-size: 11px; font-weight: 400; }
    </style>
  </defs>

  <rect width="1400" height="520" fill="#050508"/>
  <rect width="1400" height="520" fill="url(#grid)" opacity="0.48"/>
  <rect x="0.5" y="0.5" width="1399" height="519" rx="10" fill="none" stroke="#1F1F24"/>

  <text x="48" y="37" class="mono accent meta">PIPELINE / CVOPENMIC</text>
  <text x="250" y="38" class="text" font-size="20" font-weight="600">从材料到可投递文件</text>
  <text x="1352" y="37" class="mono muted meta" text-anchor="end">WORKFLOW v1.0</text>
  <line x1="48" y1="57" x2="1352" y2="57" stroke="#1F1F24"/>

  <g transform="translate(48 78)">
    <rect width="300" height="242" rx="8" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="22" y="27" class="mono accent meta">STAGE 01</text>
    <text x="278" y="27" class="mono muted meta" text-anchor="end">INGEST</text>
    <text x="22" y="56" class="text stageTitle">输入与校验</text>
    <line x1="0" y1="72" x2="300" y2="72" stroke="#1F1F24"/>

    <g transform="translate(22 92)">
      <rect x="0" y="0" width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">01.1</text>
      <text x="63" y="7" class="mono text step">resume + JD</text>
      <text x="256" y="7" class="mono muted detail" text-anchor="end">INPUT</text>
    </g>
    <line x1="22" y1="122" x2="278" y2="122" stroke="#1F1F24"/>

    <g transform="translate(22 138)">
      <rect x="0" y="0" width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">01.2</text>
      <text x="63" y="7" class="mono text step">privacy-filter</text>
      <text x="256" y="7" class="mono muted detail" text-anchor="end">GUARD</text>
    </g>
    <line x1="22" y1="168" x2="278" y2="168" stroke="#1F1F24"/>

    <g transform="translate(22 184)">
      <rect x="0" y="0" width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">01.3</text>
      <text x="63" y="7" class="mono text step">evidence-ledger</text>
      <text x="256" y="7" class="mono accent detail" text-anchor="end">BUILD</text>
      <text x="63" y="27" class="muted detail">事实 / 推断 / 缺口 / 冲突</text>
    </g>
  </g>

  <path d="M360 199H378" fill="none" stroke="#6ABFFF"/>
  <path d="M374 194L380 199L374 204" fill="none" stroke="#6ABFFF"/>

  <g transform="translate(392 78)">
    <rect width="460" height="242" rx="8" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="22" y="27" class="mono accent meta">STAGE 02</text>
    <text x="438" y="27" class="mono muted meta" text-anchor="end">REASON</text>
    <text x="22" y="56" class="text stageTitle">推理与改写</text>
    <line x1="0" y1="72" x2="460" y2="72" stroke="#1F1F24"/>

    <g transform="translate(22 91)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">02.1</text>
      <text x="66" y="7" class="mono text step">role-router</text>
      <text x="416" y="7" class="mono muted detail" text-anchor="end">岗位语言对齐</text>
    </g>
    <line x1="22" y1="119" x2="438" y2="119" stroke="#1F1F24"/>

    <g transform="translate(22 132)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">02.2</text>
      <text x="66" y="7" class="mono text step">scorecard</text>
      <text x="416" y="7" class="mono muted detail" text-anchor="end">结构 / 相关 / 证据 / ATS</text>
    </g>
    <line x1="22" y1="160" x2="438" y2="160" stroke="#1F1F24"/>

    <g transform="translate(22 173)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">02.3</text>
      <text x="66" y="7" class="mono text step">critical-review</text>
      <text x="416" y="7" class="mono muted detail" text-anchor="end">结论先行 / 问题分级</text>
    </g>
    <line x1="22" y1="201" x2="438" y2="201" stroke="#1F1F24"/>

    <g transform="translate(22 214)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">02.4</text>
      <text x="66" y="7" class="mono text step">evidence-safe rewrite</text>
      <text x="416" y="7" class="mono accent detail" text-anchor="end">TRACEABLE</text>
    </g>
  </g>

  <path d="M864 199H882" fill="none" stroke="#6ABFFF"/>
  <path d="M878 194L884 199L878 204" fill="none" stroke="#6ABFFF"/>

  <g transform="translate(896 78)">
    <rect width="456" height="242" rx="8" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="22" y="27" class="mono accent meta">STAGE 03</text>
    <text x="434" y="27" class="mono muted meta" text-anchor="end">DELIVER</text>
    <text x="22" y="56" class="text stageTitle">交付与质检</text>
    <line x1="0" y1="72" x2="456" y2="72" stroke="#1F1F24"/>

    <g transform="translate(22 104)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">03.1</text>
      <text x="66" y="7" class="mono text step">editable DOCX</text>
      <text x="412" y="7" class="mono accent detail" text-anchor="end">SOURCE</text>
      <text x="66" y="30" class="muted detail">结构完整，可继续编辑</text>
    </g>
    <line x1="22" y1="157" x2="434" y2="157" stroke="#1F1F24"/>

    <g transform="translate(22 181)">
      <rect width="6" height="6" fill="#6ABFFF"/>
      <text x="22" y="7" class="mono muted detail">03.2</text>
      <text x="66" y="7" class="mono text step">PDF visual QA</text>
      <text x="412" y="7" class="mono accent detail" text-anchor="end">PREVIEW</text>
      <text x="66" y="30" class="muted detail">分页 / 留白 / 可读性</text>
    </g>
  </g>

  <g transform="translate(48 344)">
    <rect width="1000" height="105" rx="8" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="20" y="27" class="mono accent meta">OPTIONAL BRANCH / BAZI-LENS</text>
    <text x="978" y="27" class="mono muted meta" text-anchor="end">SELF-REFLECTION ONLY</text>
    <line x1="0" y1="43" x2="1000" y2="43" stroke="#1F1F24"/>

    <text x="22" y="75" class="mono text step">birth-context</text>
    <path d="M151 70H213" fill="none" stroke="#1F1F24" stroke-dasharray="4 4"/>
    <path d="M209 66L215 70L209 74" fill="none" stroke="#6ABFFF"/>

    <text x="232" y="75" class="mono text step">cultural-map</text>
    <path d="M357 70H419" fill="none" stroke="#1F1F24" stroke-dasharray="4 4"/>
    <path d="M415 66L421 70L415 74" fill="none" stroke="#6ABFFF"/>

    <text x="438" y="75" class="mono text step">work-style hypotheses</text>
    <path d="M626 70H688" fill="none" stroke="#1F1F24" stroke-dasharray="4 4"/>
    <path d="M684 66L690 70L684 74" fill="none" stroke="#6ABFFF"/>

    <text x="708" y="75" class="mono accent step">self-reflection only</text>
  </g>

  <g transform="translate(1068 344)">
    <rect width="284" height="105" rx="8" fill="#0A0A0D" stroke="#1F1F24"/>
    <text x="20" y="27" class="mono accent meta">BOUNDARY</text>
    <line x1="0" y1="43" x2="284" y2="43" stroke="#1F1F24"/>
    <text x="20" y="66" class="mono muted detail">NO SCORE INPUT</text>
    <text x="20" y="83" class="mono muted detail">NO RESUME WRITE</text>
    <text x="264" y="83" class="mono accent detail" text-anchor="end">NO RETURN ↵</text>
  </g>

  <line x1="48" y1="472" x2="1352" y2="472" stroke="#1F1F24"/>
  <text x="48" y="496" class="mono muted" font-size="11">POLICY / every rewrite must trace to source evidence · bazi_to_score=false · bazi_to_resume=false</text>
  <text x="1352" y="496" class="mono accent" font-size="11" text-anchor="end">EVIDENCE_ONLY</text>
</svg>
