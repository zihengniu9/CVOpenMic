<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦</title>
  <desc id="desc">简历、麦克风与隐私盾牌构成的深色摄影场景。主标题为：把经历说成人话，把优势写成证据。</desc>

  <style>
    text { font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif; }
    .warm { fill: #F7F0EB; }
    .soft { fill: #D8CFCA; }
    .accent { fill: #FF6847; }
  </style>

  <image href="hero-scene.png" x="0" y="0" width="1400" height="500" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0.5" y="0.5" width="1399" height="499" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <g transform="translate(72 58)">
    <g aria-label="简历开麦 · 中文求职智能体技能">
      <rect x="0" y="0" width="5" height="18" rx="2.5" class="accent"/>
      <text x="18" y="15" class="soft" font-size="14" font-weight="600" letter-spacing="1.2">简历开麦 · 中文求职智能体技能</text>
    </g>

      <text x="0" y="108" class="warm" font-size="55" font-weight="700" letter-spacing="-1.5">把经历说成人话，</text>
    <text x="0" y="179" class="warm" font-size="55" font-weight="700" letter-spacing="-1.5">把优势写成证据。</text>
    <rect x="1" y="197" width="132" height="4" rx="2" class="accent"/>

    <text x="0" y="247" class="soft" font-size="18" font-weight="400" letter-spacing="0.2">先提炼，再开麦，最后交付可编辑简历。</text>

    <g transform="translate(0 284)" font-size="14" font-weight="600">
      <g>
        <rect width="104" height="36" rx="18" fill="#0B0A0A" fill-opacity="0.58" stroke="#C6B6AD" stroke-opacity="0.35"/>
        <circle cx="19" cy="18" r="3" class="accent"/>
        <text x="31" y="23" class="warm">证据优先</text>
      </g>
      <g transform="translate(116 0)">
        <rect width="104" height="36" rx="18" fill="#0B0A0A" fill-opacity="0.58" stroke="#C6B6AD" stroke-opacity="0.35"/>
        <circle cx="19" cy="18" r="3" class="accent"/>
        <text x="31" y="23" class="warm">不编经历</text>
      </g>
      <g transform="translate(232 0)">
        <rect width="152" height="36" rx="18" fill="#0B0A0A" fill-opacity="0.58" stroke="#C6B6AD" stroke-opacity="0.35"/>
        <circle cx="19" cy="18" r="3" class="accent"/>
        <text x="31" y="23" class="warm">Word / PDF 交付</text>
      </g>
    </g>
  </g>
</svg>
