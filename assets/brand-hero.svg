<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">简历开麦 CVOpenMic 品牌首屏</title>
  <desc id="desc">把经历说成人话，把优势写成证据。支持核心提炼、毒舌诊断、事实安全改写和 Word PDF 交付。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071A2C"/>
      <stop offset="0.58" stop-color="#0D2B42"/>
      <stop offset="1" stop-color="#11495A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#C7F464"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020B14" flood-opacity="0.32"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .muted { fill: #B9CFDA; }
      .chip { font-size: 20px; font-weight: 700; fill: #EAF7F6; }
    </style>
  </defs>

  <rect width="1400" height="560" rx="34" fill="url(#bg)"/>
  <circle cx="1298" cy="72" r="210" fill="#2DD4BF" opacity="0.08"/>
  <circle cx="1200" cy="520" r="265" fill="#C7F464" opacity="0.055"/>
  <path d="M0 465 C210 405 312 545 555 488 C755 441 824 382 1057 442 C1201 479 1308 471 1400 432 L1400 560 L0 560 Z" fill="#2DD4BF" opacity="0.055"/>

  <g transform="translate(86 78)">
    <rect x="0" y="0" width="86" height="86" rx="24" fill="url(#accent)"/>
    <path d="M22 20 H57 Q67 20 67 30 V54 Q67 64 57 64 H43 L31 75 V64 H22 Q14 64 14 54 V30 Q14 20 22 20 Z" fill="#0B2639"/>
    <rect x="37" y="28" width="12" height="23" rx="6" fill="#F7FAFC"/>
    <path d="M30 45 Q30 58 43 58 Q56 58 56 45" fill="none" stroke="#F7FAFC" stroke-width="4" stroke-linecap="round"/>
    <path d="M43 58 V65 M35 65 H51" fill="none" stroke="#F7FAFC" stroke-width="4" stroke-linecap="round"/>

    <text x="112" y="52" font-size="48" font-weight="800" fill="#F7FAFC" letter-spacing="2">简历开麦</text>
    <text x="113" y="81" font-size="18" font-weight="700" fill="#62E5D7" letter-spacing="2.4">CVOPENMIC</text>

    <text x="0" y="176" font-size="58" font-weight="900" fill="#F7FAFC">把经历说成人话，</text>
    <text x="0" y="244" font-size="58" font-weight="900" fill="url(#accent)">把优势写成证据。</text>
    <text x="2" y="290" font-size="23" class="muted">面向中文求职场景的 Agent Skill · 不编故事，只把事实说清楚</text>

    <g transform="translate(0 332)">
      <g>
        <rect width="136" height="48" rx="24" fill="#173D52" stroke="#2F6074"/>
        <circle cx="25" cy="24" r="7" fill="#2DD4BF"/>
        <text x="45" y="31" class="chip">核心提炼</text>
      </g>
      <g transform="translate(152 0)">
        <rect width="136" height="48" rx="24" fill="#173D52" stroke="#2F6074"/>
        <circle cx="25" cy="24" r="7" fill="#FF6B57"/>
        <text x="45" y="31" class="chip">毒舌诊断</text>
      </g>
      <g transform="translate(304 0)">
        <rect width="164" height="48" rx="24" fill="#173D52" stroke="#2F6074"/>
        <circle cx="25" cy="24" r="7" fill="#FFCC66"/>
        <text x="45" y="31" class="chip">事实安全改写</text>
      </g>
      <g transform="translate(484 0)">
        <rect width="158" height="48" rx="24" fill="#173D52" stroke="#2F6074"/>
        <circle cx="25" cy="24" r="7" fill="#C7F464"/>
        <text x="45" y="31" class="chip">Word + PDF</text>
      </g>
    </g>
  </g>

  <g transform="translate(885 64)" filter="url(#shadow)">
    <rect x="0" y="0" width="388" height="428" rx="28" fill="#F8FBFC"/>
    <rect x="0" y="0" width="388" height="72" rx="28" fill="#E9F7F5"/>
    <rect x="0" y="48" width="388" height="24" fill="#E9F7F5"/>
    <circle cx="36" cy="35" r="8" fill="#FF6B57"/>
    <circle cx="61" cy="35" r="8" fill="#FFCC66"/>
    <circle cx="86" cy="35" r="8" fill="#2DD4BF"/>
    <text x="116" y="43" font-size="18" font-weight="800" fill="#183B4E">证据化简历</text>

    <rect x="30" y="99" width="116" height="16" rx="8" fill="#163B50"/>
    <rect x="30" y="130" width="236" height="10" rx="5" fill="#9FB3C1"/>
    <rect x="30" y="150" width="194" height="10" rx="5" fill="#CBD7DF"/>

    <g transform="translate(30 187)">
      <rect width="328" height="74" rx="15" fill="#EEF8F6" stroke="#BDE7E1"/>
      <rect x="16" y="16" width="44" height="42" rx="11" fill="#2DD4BF"/>
      <path d="M29 38 L37 46 L51 27" fill="none" stroke="#092637" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="75" y="31" font-size="16" font-weight="800" fill="#164E58">结论先行</text>
      <text x="75" y="54" font-size="14" fill="#486581">先说结果，再补动作与证据</text>
    </g>

    <g transform="translate(30 277)">
      <rect width="328" height="74" rx="15" fill="#FFF5F2" stroke="#FFD2C9"/>
      <rect x="16" y="16" width="44" height="42" rx="11" fill="#FF6B57"/>
      <path d="M37 24 V45 M37 54 V55" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <text x="75" y="31" font-size="16" font-weight="800" fill="#9D2C20">毒舌开麦</text>
      <text x="75" y="54" font-size="14" fill="#7B4B45">指出硬伤，也给可直接替换的表述</text>
    </g>

    <g transform="translate(30 373)">
      <rect width="148" height="34" rx="17" fill="#173D52"/>
      <text x="74" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#F7FAFC">DOCX 可编辑</text>
      <rect x="180" width="148" height="34" rx="17" fill="#C7F464"/>
      <text x="254" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#183B4E">PDF 可预览</text>
    </g>
  </g>
</svg>
