interface:
  display_name: "简历开麦"
  short_description: "简历诊断、JD匹配、事实安全改写与可选八字职业镜像"
  default_prompt: "Use $cvopenmic to review and rewrite this resume for the target job. Preserve all source education and work entries, lead with supported conclusions and data, and never invent facts. Deliver an editable DOCX as the canonical file using the compact black-and-white single-column Word layout, with centered identity header, section rules, aligned experience headers, and real bullets. Render the matching PDF from that DOCX and visually verify balanced pagination with no large empty lower half. Add the Bazi career mirror only when explicitly requested, validate its work-style hypotheses against real experience, and keep it outside the CV and scorecard."
